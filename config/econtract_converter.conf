# econtract_converter.conf
# Environment configuration for the eContract → Smart Contract Converter.
# Copy this file to your shell profile or source it before running econtract.sh.
#
# Usage:
#   source config/econtract_converter.conf
#   ./econtract.sh contract.docx

# ── LLM Model ──────────────────────────────────────────────────────────────
# Model to use for generation.
# Recommended models (accuracy → speed trade-off):
#   qwen2.5-coder:32b   → highest accuracy, slow (~5-15 min)
#   qwen2.5-coder:14b   → good balance (~2-5 min)
#   qwen2.5-coder:7b    → fastest, good for smaller contracts (~1-3 min)
#   deepseek-coder:6.7b → alternative fast option
export LLM_MODEL="qwen2.5-coder:14b"

# ── Backend ────────────────────────────────────────────────────────────────
# "ollama"  → local Ollama instance (default, private)
# "openai"  → OpenAI or OpenAI-compatible API
export LLM_BACKEND="ollama"

# ── Ollama Configuration ───────────────────────────────────────────────────
export OLLAMA_BASE_URL="http://172.20.0.77:11434"

# ── OpenAI-compatible (if using --backend openai) ─────────────────────────
# export OPENAI_API_KEY="sk-..."
# export OLLAMA_BASE_URL="https://api.openai.com"  # or any compatible base

# ── Generation parameters ──────────────────────────────────────────────────
# Temperature: 0.1 = deterministic/accurate, 0.7 = more creative
# Recommended: keep at 0.1 for smart contract generation
export LLM_TEMPERATURE="0.1"